# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                       NX AFFECTED PLAN (v4)                                 ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  Lightweight planner reusable that computes the affected project sets       ║
# ║  per requested target, splits each set into N shards, and emits a single    ║
# ║  GH Actions matrix the caller fans out across runners. Pairs with           ║
# ║  nx-ci.yml@v4 (which can now accept target/projects/nx_base/nx_head and    ║
# ║  run as a single shard).                                                    ║
# ║                                                                              ║
# ║  Typical caller topology:                                                   ║
# ║                                                                              ║
# ║    plan ─► [shard 1] [shard 2] … [shard N]                                  ║
# ║                                                                              ║
# ║  The plan job is cheap (~60s — checkout + pnpm install + nx queries) and    ║
# ║  runs once per CI invocation. Each shard inherits the same NX_BASE / NX_HEAD║
# ║  so affected detection stays consistent across all matrix rows.             ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

name: Nx Affected Plan (v4)

on:
  workflow_call:
    inputs:
      # Comma-separated list of nx targets to plan for.
      # Example: "lint,test,build,integration,e2e".
      # The plan emits one or more matrix rows per target depending on
      # the *_shards inputs below.
      targets:
        description: "Comma-separated list of nx targets to plan for"
        required: true
        type: string

      # Per-target shard counts. Defaults to 1 (single shard) so callers
      # can dial up only the targets they want to fan out.
      lint_shards:
        description: "Number of shards for `lint` target"
        required: false
        type: number
        default: 1
      test_shards:
        description: "Number of shards for `test` target"
        required: false
        type: number
        default: 1
      build_shards:
        description: "Number of shards for `build` target"
        required: false
        type: number
        default: 1
      integration_shards:
        description: "Number of shards for `integration` target"
        required: false
        type: number
        default: 1
      e2e_shards:
        description: "Number of shards for `e2e` target"
        required: false
        type: number
        default: 1
      custom_shards:
        description: |
          Number of shards for any non-standard target (each custom target
          gets this many shards). Custom targets are anything in `targets`
          that isn't lint/test/build/integration/e2e.
        required: false
        type: number
        default: 1

      ref:
        description: "Git ref to plan against. Defaults to triggering ref."
        required: false
        type: string
        default: ""

      runs_on:
        description: "Runner label for the plan job."
        required: false
        type: string
        default: "ubuntu-latest"

      working_directory:
        description: "Working directory for the plan."
        required: false
        type: string
        default: "."

      affected_only:
        description: |
          When true (default), the plan only includes projects that nx
          considers affected. When false, includes ALL projects with the
          target defined.
        required: false
        type: boolean
        default: true

      timeout_minutes:
        description: "Plan job timeout."
        required: false
        type: number
        default: 10

      # ─────────────────────────────────────────────────────────────────────────
      # Gates (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # Evaluate boolean gates against the affected set without forcing the
      # caller to spin up a separate "detect affected" job. Each gate is a
      # `name=pattern` pair; the plan emits a JSON map of gate names to
      # booleans. Consumers reference via:
      #   `fromJSON(needs.plan.outputs.gates).has_sql == true`
      gates:
        description: |
          Semicolon-separated `gate_name=pattern` pairs. Each pattern is
          matched against the affected project set; if at least one
          project matches, the gate's boolean is `true`. Patterns are
          shell-glob style (`*`, `?`) — NOT regex.

          Example:
            gates: "has_sql=mcpg-plugin-backend-sql;has_cluster=mcpg-plugin-cluster-*;has_payment=mcpg-plugin-payment-*"

          The plan emits a JSON map as the `gates` output, e.g.:
            {"has_sql": true, "has_cluster": false, "has_payment": true}

          Language-agnostic: gates are purely Nx project-graph queries.
          Empty (default) skips the gate-evaluation step entirely.
        required: false
        type: string
        default: ""

    secrets:
      # Self-hosted cache plumbing — declared so cross-org callers can pass
      # them explicitly. The plan job doesn't run heavy tasks but the
      # `nx show projects` invocation still reads nx.json's S3 cache config.
      nx_key:
        required: false
      aws_access_key_id:
        required: false
      aws_secret_access_key:
        required: false

    outputs:
      matrix:
        description: |
          JSON-encoded `{include: [...]}` for the caller's `strategy.matrix`.
          Each entry has: target (string), shard (1..N), shards_total (N),
          projects (comma-separated string).
        value: ${{ jobs.plan.outputs.matrix }}
      nx_base:
        description: "Base SHA computed by nrwl/nx-set-shas. Pass to every shard."
        value: ${{ jobs.plan.outputs.nx_base }}
      nx_head:
        description: "Head SHA computed by nrwl/nx-set-shas. Pass to every shard."
        value: ${{ jobs.plan.outputs.nx_head }}
      gates:
        description: |
          JSON map of gate name → boolean evaluated against the affected
          set. Emitted only when the `gates` input is non-empty;
          otherwise `"{}"`. Consume via
          `fromJSON(needs.plan.outputs.gates).has_sql`.
        value: ${{ jobs.plan.outputs.gates }}

      has_shards:
        description: |
          "true" if at least one target has affected projects. Callers
          should gate the matrix job on this to skip cleanly when there's
          nothing to do.
        value: ${{ jobs.plan.outputs.has_shards }}

env:
  # Opt every JS action onto Node 24 instead of the runner's default
  # Node 20. See nx-ci.yml for the rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # @nx/s3-cache wiring (free in Nx 21+). The plan job benefits from the
  # remote cache when computing the affected graph; cheap to enable here.
  NX_KEY: ${{ secrets.nx_key }}
  AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}
  # Plan never writes to the cache. Belt-and-suspenders.
  NX_POWERPACK_CACHE_MODE: "read-only"
  NX_NO_CLOUD: "true"

jobs:
  plan:
    name: Plan
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
        shell: bash

    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      nx_base: ${{ steps.set-shas.outputs.base }}
      nx_head: ${{ steps.set-shas.outputs.head }}
      has_shards: ${{ steps.plan.outputs.has_shards }}
      gates: ${{ steps.gates.outputs.gates }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Configure git safe.directory
        run: git config --global --add safe.directory '*'

      - name: Set Nx SHAs for affected detection
        id: set-shas
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: ${{ github.event.repository.default_branch || 'main' }}

      - name: Prime git empty-tree object
        # nrwl/nx-set-shas falls back to the empty-tree SHA when no prior
        # successful workflow exists. Without this `git diff` blows up.
        run: git hash-object -w -t tree --stdin < /dev/null

      - name: Detect package manager
        id: pkg
        run: |
          if [ -f bun.lockb ] || [ -f bun.lock ]; then
            echo "manager=bun" >> "$GITHUB_OUTPUT"
          elif [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npx" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.pkg.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install workspace deps
        run: |
          case "${{ steps.pkg.outputs.manager }}" in
            pnpm)  pnpm install --frozen-lockfile --prefer-offline ;;
            bun)   bun install --frozen-lockfile ;;
            yarn)  yarn install --frozen-lockfile ;;
            npm)   npm ci ;;
            npx)   echo "No lockfile — assuming nx is globally available" ;;
          esac

      - name: Plan matrix
        id: plan
        env:
          NX_BASE: ${{ steps.set-shas.outputs.base }}
          NX_HEAD: ${{ steps.set-shas.outputs.head }}
          TARGETS_CSV: ${{ inputs.targets }}
          AFFECTED_ONLY: ${{ inputs.affected_only }}
          LINT_SHARDS: ${{ inputs.lint_shards }}
          TEST_SHARDS: ${{ inputs.test_shards }}
          BUILD_SHARDS: ${{ inputs.build_shards }}
          INTEGRATION_SHARDS: ${{ inputs.integration_shards }}
          E2E_SHARDS: ${{ inputs.e2e_shards }}
          CUSTOM_SHARDS: ${{ inputs.custom_shards }}
          PKG_MGR: ${{ steps.pkg.outputs.manager }}
        run: |
          set -euo pipefail

          # Build the base `nx show projects` command.
          case "$PKG_MGR" in
            bun)   NX_CMD="bun nx" ;;
            pnpm)  NX_CMD="pnpm nx" ;;
            yarn)  NX_CMD="yarn nx" ;;
            npm)   NX_CMD="npm exec nx --" ;;
            *)     NX_CMD="npx nx" ;;
          esac

          shards_for_target() {
            case "$1" in
              lint)        echo "$LINT_SHARDS" ;;
              test)        echo "$TEST_SHARDS" ;;
              build)       echo "$BUILD_SHARDS" ;;
              integration) echo "$INTEGRATION_SHARDS" ;;
              e2e)         echo "$E2E_SHARDS" ;;
              *)           echo "$CUSTOM_SHARDS" ;;
            esac
          }

          matrix_entries='[]'
          has_shards=false

          IFS=',' read -ra TARGETS <<< "$TARGETS_CSV"
          for raw in "${TARGETS[@]}"; do
            target="$(echo "$raw" | xargs)"
            [ -z "$target" ] && continue

            # Query nx for projects with this target on the affected set.
            # Output is a JSON array of project name strings.
            if [ "$AFFECTED_ONLY" = "true" ]; then
              proj_json=$($NX_CMD show projects --affected --base="$NX_BASE" --head="$NX_HEAD" -t "$target" --json 2>/dev/null || echo '[]')
            else
              proj_json=$($NX_CMD show projects -t "$target" --json 2>/dev/null || echo '[]')
            fi

            project_count=$(echo "$proj_json" | jq 'length')
            if [ "$project_count" -eq 0 ]; then
              echo "ℹ️  No affected projects for target=$target — skipping"
              continue
            fi

            shards=$(shards_for_target "$target")
            # Don't oversharded: cap shards at project_count.
            if [ "$shards" -gt "$project_count" ]; then
              shards="$project_count"
            fi
            [ "$shards" -lt 1 ] && shards=1

            # Split the project list into $shards contiguous chunks. Sort
            # by name first so chunking is deterministic across runs.
            sorted_csv=$(echo "$proj_json" | jq -r 'sort | join(",")')
            IFS=',' read -ra ALL <<< "$sorted_csv"

            chunk_size=$(( (project_count + shards - 1) / shards ))
            for ((i=0; i<shards; i++)); do
              start=$(( i * chunk_size ))
              [ "$start" -ge "$project_count" ] && break
              end=$(( start + chunk_size ))
              [ "$end" -gt "$project_count" ] && end="$project_count"
              chunk=$(IFS=','; echo "${ALL[*]:start:chunk_size}")

              entry=$(jq -nc \
                --arg target "$target" \
                --argjson shard $((i+1)) \
                --argjson shards_total "$shards" \
                --arg projects "$chunk" \
                '{target: $target, shard: $shard, shards_total: $shards_total, projects: $projects}')
              matrix_entries=$(echo "$matrix_entries" | jq -c --argjson e "$entry" '. + [$e]')
              has_shards=true
            done

            echo "📋 target=$target: $project_count project(s) across $shards shard(s)"
          done

          # Final matrix wraps in {include: [...]} so callers consume via
          # strategy.matrix = fromJson(needs.plan.outputs.matrix).
          matrix=$(jq -nc --argjson include "$matrix_entries" '{include: $include}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_shards=$has_shards" >> "$GITHUB_OUTPUT"

          # Friendly summary for the GH Actions UI.
          {
            echo "## 📋 Affected Plan"
            echo ""
            echo "**Base:** \`$NX_BASE\`  "
            echo "**Head:** \`$NX_HEAD\`  "
            echo "**Has shards:** $has_shards"
            echo ""
            echo '```json'
            echo "$matrix" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════════════════════
      # 🚦 EVALUATE GATES (v5 addition — opt-in)
      # ════════════════════════════════════════════════════════════════════════
      # For each `gate_name=pattern` pair in the `gates` input, run nx to
      # check whether any project in the affected set matches the pattern.
      # Emits a JSON map as the `gates` output. Skipped (emits `{}`) when
      # the input is empty.
      #
      # Patterns are shell-glob style. The Nx CLI accepts these directly via
      # `nx show projects --affected -p '<glob>' --json`. We use `nx show`
      # rather than re-querying jq against the matrix output so the gate
      # evaluation honors the full affected detection semantics (including
      # implicit deps, namedInputs, etc.).
      - name: Evaluate gates
        id: gates
        # Always runs (even when `inputs.gates == ''`) so the workflow-level
        # `gates` output is consistently `{...}` JSON. The empty-input
        # branch fast-exits with `{}` after a single output write.
        env:
          NX_BASE: ${{ steps.set-shas.outputs.base }}
          NX_HEAD: ${{ steps.set-shas.outputs.head }}
          GATES_CSV: ${{ inputs.gates }}
          PKG_MGR: ${{ steps.pkg.outputs.manager }}
        run: |
          set -euo pipefail
          if [ -z "$GATES_CSV" ]; then
            echo "gates={}" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No gates configured — emitting empty map."
            exit 0
          fi

          case "$PKG_MGR" in
            bun)   NX_CMD="bun nx" ;;
            pnpm)  NX_CMD="pnpm nx" ;;
            yarn)  NX_CMD="yarn nx" ;;
            npm)   NX_CMD="npm exec nx --" ;;
            *)     NX_CMD="npx nx" ;;
          esac

          gates_map='{}'
          IFS=';' read -ra PAIRS <<< "$GATES_CSV"
          for pair in "${PAIRS[@]}"; do
            pair="$(echo "$pair" | xargs)"
            [ -z "$pair" ] && continue

            name="${pair%%=*}"
            pattern="${pair#*=}"
            if [ -z "$name" ] || [ -z "$pattern" ] || [ "$name" = "$pair" ]; then
              echo "::warning::Malformed gate entry '$pair' — expected name=pattern. Skipping."
              continue
            fi

            # Query nx with the glob pattern. Output: JSON array of
            # matching affected project names. Non-empty array = true.
            matches=$($NX_CMD show projects --affected --base="$NX_BASE" --head="$NX_HEAD" -p "$pattern" --json 2>/dev/null || echo '[]')
            count=$(echo "$matches" | jq 'length')

            if [ "$count" -gt 0 ]; then
              value=true
              echo "✅ gate $name=$pattern → true ($count affected project(s))"
            else
              value=false
              echo "⬜ gate $name=$pattern → false"
            fi
            gates_map=$(echo "$gates_map" | jq -c --arg name "$name" --argjson v "$value" '. + {($name): $v}')
          done

          echo "gates=$gates_map" >> "$GITHUB_OUTPUT"
          {
            echo ""
            echo "### 🚦 Gates"
            echo ""
            echo '```json'
            echo "$gates_map" | jq .
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
