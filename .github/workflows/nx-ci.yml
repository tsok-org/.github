# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                      NX CONTINUOUS INTEGRATION WORKFLOW                      ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  Reusable CI workflow for Nx monorepos with affected detection,              ║
# ║  parallel execution, and optional Nx Cloud distribution.                     ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ FEATURES                                                                    │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ • system_packages + language packs (legacy .environment.yml: deprecated)   │
# │ • Automatic package manager detection (npm, pnpm, yarn, bun)               │
# │ • Nx affected detection for optimized builds                               │
# │ • Configurable lint, test, build, and e2e tasks                           │
# │ • Parallel execution with configurable concurrency                         │
# │ • Optional Nx Cloud distributed task execution                             │
# │ • Coverage reporting with upload support                                   │
# │ • Project exclusion for infrastructure or special projects                 │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ USAGE                                                                       │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │                                                                             │
# │   name: CI                                                                  │
# │   on:                                                                       │
# │     pull_request:                                                           │
# │       branches: [main, develop]                                             │
# │                                                                             │
# │   permissions:                                                              │
# │     contents: read                                                          │
# │     checks: write                                                           │
# │                                                                             │
# │   jobs:                                                                     │
# │     ci:                                                                     │
# │       uses: tsok-org/.github/.github/workflows/nx-ci.yml@main              │
# │       with:                                                                 │
# │         lint: true                                                          │
# │         test: true                                                          │
# │         build: true                                                         │
# │       secrets:                                                              │
# │         nx_cloud_access_token: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}        │
# │                                                                             │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ NX CLOUD DISTRIBUTION                                                       │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ For faster CI with distributed task execution:                              │
# │                                                                             │
# │   with:                                                                     │
# │     distribute_on: "3 linux-medium-js"                                     │
# │                                                                             │
# │ This spins up 3 Nx Cloud agents to parallelize tasks across machines.      │
# │ Requires an Nx Cloud account and NX_CLOUD_ACCESS_TOKEN secret.             │
# └─────────────────────────────────────────────────────────────────────────────┘

name: Nx CI

on:
  workflow_call:
    inputs:
      # ─────────────────────────────────────────────────────────────────────────
      # Environment Setup Configuration
      # ─────────────────────────────────────────────────────────────────────────
      environment_config:
        description: |
          Path to environment configuration file.
          Default: .environment.yml
        required: false
        type: string
        default: ".environment.yml"

      environment_skip:
        description: |
          Components to skip in environment setup (comma-separated).
          Options: node, python, terraform, docker, services
          Default for CI: "docker,terraform,services"
        required: false
        type: string
        default: "docker,terraform,services"

      environment_only:
        description: |
          Only setup these components (comma-separated).
          If set, only listed components are configured.
          Example: "node" or "node,python"
        required: false
        type: string
        default: ""

      working_directory:
        description: |
          Working directory for the CI tasks.
          Useful for nested Nx workspaces.
        required: false
        type: string
        default: "."

      # ─────────────────────────────────────────────────────────────────────────
      # Single-shard mode (v4 — pairs with nx-affected-plan.yml)
      # ─────────────────────────────────────────────────────────────────────────
      # When `target` and `projects` are both set, the workflow runs a
      # SINGLE nx target on the supplied project list (skipping affected
      # detection and the lint/test/build/integration/e2e/custom_tasks
      # branching). This is the matrix-row mode: nx-affected-plan.yml
      # computes the per-target shard list once, then the caller's
      # matrix calls this workflow N times with `target=<...>
      # projects=<csv>`. NX_BASE / NX_HEAD are passed through so any
      # affected-aware tooling inside the run-many sees the same view.
      #
      # Backwards compatible: callers that DON'T set `target` keep the
      # legacy multi-target behavior bit-for-bit.
      target:
        description: |
          Single nx target to run (e.g. "test", "lint", "build"). When
          set, the lint/test/build/integration/e2e/custom_tasks inputs
          are ignored. Pair with `projects` for matrix-row execution.
        required: false
        type: string
        default: ""

      projects:
        description: |
          Comma-separated list of nx projects to run `target` on. When
          set together with `target`, the workflow skips affected
          detection and runs `nx run-many -t <target> -p <projects>`.
          Pass the value emitted by nx-affected-plan.yml's matrix.
        required: false
        type: string
        default: ""

      nx_base:
        description: |
          Pre-computed NX_BASE SHA from nx-affected-plan.yml. Pass
          through so all shards see the same view of affected. Only
          honored when `target`+`projects` are set.
        required: false
        type: string
        default: ""

      nx_head:
        description: |
          Pre-computed NX_HEAD SHA from nx-affected-plan.yml. Pass
          through so all shards see the same view of affected. Only
          honored when `target`+`projects` are set.
        required: false
        type: string
        default: ""

      shard:
        description: |
          1-based shard index for this matrix row (1..shards_total).
          Used to scope `CARGO_TARGET_DIR` so concurrent shards on the
          same runner don't fight over the same target dir.
        required: false
        type: number
        default: 0

      shards_total:
        description: |
          Total number of shards in this matrix run. Cosmetic — used
          for log clarity and `CARGO_TARGET_DIR` scoping.
        required: false
        type: number
        default: 1

      # ─────────────────────────────────────────────────────────────────────────
      # Task Configuration
      # ─────────────────────────────────────────────────────────────────────────
      lint:
        description: "Run lint task on affected projects"
        required: false
        type: boolean
        default: true

      test:
        description: "Run test task on affected projects"
        required: false
        type: boolean
        default: true

      build:
        description: "Run build task on affected projects"
        required: false
        type: boolean
        default: true

      e2e:
        description: "Run e2e task on affected projects"
        required: false
        type: boolean
        default: false

      integration:
        description: |
          Run the `integration` Nx target on projects that define it.
          Intended for CD-gated lanes (merges / PRs targeting main / develop
          / next) where integration suites against real databases, services,
          and other heavy fixtures should run. Feature-branch PRs typically
          keep this off so daily iteration stays fast.

          Projects without an `integration` target are skipped silently
          (nx reports the target is missing and moves on).

          Services that integration suites depend on (postgres, mysql,
          redis, nats, etc.) must be enabled via `environment_skip` /
          `.environment.yml` — this input only runs the target.

          **v2 rename:** this input was named `test_integration` in v1
          and ran the `test:integration` target. Both renamed to the
          unprefixed `integration` for naming uniformity with `lint`,
          `test`, `build`, `e2e`.
        required: false
        type: boolean
        default: false

      custom_tasks:
        description: |
          Additional custom tasks to run (comma-separated).
          Example: "typecheck,format:check"
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Execution Configuration
      # ─────────────────────────────────────────────────────────────────────────
      parallel:
        description: |
          Number of parallel tasks to run.
          Set to 1 for sequential execution.
        required: false
        type: number
        default: 3

      affected_only:
        description: |
          Run tasks only on affected projects.
          Set to false to run on all projects.
        required: false
        type: boolean
        default: true

      exclude_projects:
        description: |
          Comma-separated list of projects to exclude.
          Supports glob patterns.
          Example: "cloud-*,legacy-app"
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Coverage Configuration
      # ─────────────────────────────────────────────────────────────────────────
      coverage:
        description: "Enable test coverage collection"
        required: false
        type: boolean
        default: false

      coverage_reporter:
        description: |
          Coverage reporter to use.
          Options: codecov, coveralls, none
        required: false
        type: string
        default: "none"

      # ─────────────────────────────────────────────────────────────────────────
      # Nx Cloud Configuration
      # ─────────────────────────────────────────────────────────────────────────
      distribute_on:
        description: |
          Nx Cloud distribution configuration.
          Example: "3 linux-medium-js" to use 3 cloud agents.
          Leave empty to disable distribution.
        required: false
        type: string
        default: ""

      stop_agents_after:
        description: |
          Task to stop agents after (when using distribution).
        required: false
        type: string
        default: "build"

      nx_cloud_enabled:
        description: |
          Whether to use Nx Cloud for caching.
          Set to false to disable Nx Cloud entirely.
        required: false
        type: boolean
        default: true

      # ─────────────────────────────────────────────────────────────────────────
      # Git Configuration
      # ─────────────────────────────────────────────────────────────────────────
      ref:
        description: |
          Git ref to checkout (branch, tag, or SHA).
          Leave empty to use the triggering ref (default behavior — i.e. the
          PR head for `pull_request`, the pushed ref for `push`, etc.).

          Useful for scheduled/workflow_dispatch callers that need to test a
          specific branch rather than the default branch the cron fires from.
          Mirrors the `ref` input already exposed by nx-cd.yml.
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Runner Configuration
      # ─────────────────────────────────────────────────────────────────────────
      runs_on:
        description: |
          Runner label passed straight to `runs-on`. Any runner that
          advertises this label can pick up the job — for self-hosted
          runners that's the label you set in `config.sh --labels …`
          (the agent always advertises `self-hosted` alongside it, so
          a single custom label is enough to disambiguate). For
          GitHub-hosted runners, use the usual names (`ubuntu-latest`,
          `macos-14`, `windows-2022`, …).
        required: false
        type: string
        default: "ubuntu-latest"

      timeout_minutes:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

      verbose:
        description: |
          Verbose diagnostic logging for the CI run:
          - appends --verbose to every `nx affected`/`run-many` invocation
          - sets RUST_BACKTRACE=1 for stack traces on panics
          - sets CARGO_TERM_VERBOSE=true so cargo prints per-unit build progress
          - sets NX_VERBOSE_LOGGING=true and disables dynamic terminal rewriting
            so CI logs preserve per-task output rather than collapsing it
          Use sparingly — verbose output is expensive to scan and can exceed
          GitHub's 10 MB/step log cap on large workspaces.
        required: false
        type: boolean
        default: false

      # ─────────────────────────────────────────────────────────────────────────
      # Container Runner (v3 addition)
      # ─────────────────────────────────────────────────────────────────────────
      container_image:
        description: |
          OCI image to run the job in via `jobs.<id>.container.image`. When
          set, all steps execute inside this image; the environment-setup
          composite automatically skips its install steps (the image is
          expected to bake the runtimes + tools). Pass an explicit empty
          string (the default) to keep the legacy host-runner behavior.

          The image's GHCR credentials are pulled with the workflow's
          GITHUB_TOKEN — for public images that's a no-op, for private
          images the consuming repo needs `packages: read` on the workflow.

          Callers that need postgres/mysql/redis/nats must supply them as
          GitHub Actions `services:` containers (the composite cannot start
          DB servers inside a containerized job). For workflows already
          using `services:` (sql-integration-matrix, cluster-matrix), this
          input is a drop-in win.
        required: false
        type: string
        default: ""

      container_options:
        description: |
          String passed to `jobs.<id>.container.options`. Most common use:
          `--volume /var/run/docker.sock:/var/run/docker.sock` so that
          testcontainers / `docker buildx` inside the job hit the host
          daemon. Other useful flags: `--user`, `--cpus`, `--memory`.
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # GitHub App Authentication
      # ─────────────────────────────────────────────────────────────────────────
      github_app_id:
        description: "GitHub App ID for authentication (optional)"
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Language packs (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # The workflow body is language-agnostic — it only invokes Nx. Anything
      # language-specific (CARGO_TARGET_DIR scoping, env validation, cache
      # gating, etc.) lives in a composite action that this workflow invokes
      # when the corresponding pack is listed in `language_packs`. Supported
      # packs ship in tsok-org/.github/actions/nx-<lang>-setup. Add a new
      # language by adding a new composite — NOT by editing this workflow.
      #
      # Currently supported:
      #   - rust       → actions/nx-rust-setup
      #
      # Always-on (no opt-in needed):
      #   - workspace  → actions/nx-workspace-setup (pnpm/yarn/npm install).
      #                  Mandatory in container mode because nx itself is a
      #                  Node package, regardless of app-code language.
      #
      # Future:
      #   - go, python, c — add the composite + a new `if: contains(...)`
      #     branch alongside the existing rust step.
      language_packs:
        description: |
          Comma-separated language packs to enable in CONTAINER MODE. Each
          pack invokes the matching tsok-org composite action before the
          nx target runs. Ignored when `container_image` is empty (host
          mode delegates to actions/environment-setup, which now auto-
          detects toolchains from rust-toolchain.toml / package.json
          when no .environment.yml is present).

          Supported: rust.
          Reserved-for-future: go, python, c, java.

          Example: language_packs: "rust"
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # System packages (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # Apt packages to install on the host runner before the Nx target runs.
      # Most useful in HOST MODE (container_image empty) where the runner
      # doesn't bake the C dev libraries that Rust *-sys crates link against
      # — e.g. libsasl2-dev for sasl2-sys, libssl-dev for openssl-sys,
      # libcurl4-openssl-dev for curl-sys. In container mode, the container
      # image is expected to provide these and this input is ignored.
      #
      # Replaces the previous pattern of declaring system_packages in a
      # checked-in .environment.yml + relying on actions/environment-setup
      # to apt-install them. Inputs are easier to change per-caller, version
      # in PRs, and audit at glance — no schema indirection.
      #
      # Format: space- or newline-separated package names, exactly what apt
      # install expects.
      system_packages:
        description: |
          Apt packages to install on host runners (ignored in container mode).
          Space- or newline-separated.

          Example:
            system_packages: >-
              libsasl2-dev libssl-dev libcurl4-openssl-dev
              libzstd-dev protobuf-compiler pkg-config lld
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Caller setup commands (v5.3 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # Arbitrary shell to run after workspace setup, before language packs
      # and the nx invocation. Runs in BOTH modes. This is the successor to
      # the .environment.yml "services"/tooling escape hatch the legacy
      # environment-setup provided: callers whose test suites need an extra
      # binary on PATH (a pinned nats-server, a CLI fixture, …) version the
      # install script in THEIR repo and invoke it here — the diff lives in
      # the calling repo's PR, not in the reusable layer.
      setup_commands:
        description: |
          Multi-line bash to run before the nx invocation (after checkout +
          workspace setup). Use for caller-specific tooling installs that
          neither apt (system_packages) nor the container image covers.
          Prefer invoking a script committed to the calling repo over
          inlining logic here. A failing command fails the job.

          Example:
            setup_commands: |
              bash tools/ci/ensure-nats-server.sh
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Nx target configuration suffix (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # Nx supports per-target configurations: `nx run myproj:test:pg17`.
      # Pass the suffix here (without the leading colon) and the workflow
      # appends it to the target name when invoking nx. Mutually compatible
      # with the existing single-shard `target` + `projects` inputs.
      target_configuration:
        description: |
          Nx target configuration suffix (without leading colon). When set,
          the nx invocation becomes `nx run-many -t <target>:<configuration>
          -p <projects>`. Useful for parameterised test matrices (e.g.
          per-DB-engine configurations on the SQL backend plugin).

          Default empty = no configuration suffix.
        required: false
        type: string
        default: ""

      # ─────────────────────────────────────────────────────────────────────────
      # Extra env vars (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # Lets callers pass arbitrary env vars without modifying the reusable
      # workflow. JSON object of {name: value}; each entry is exported to
      # GITHUB_ENV before the language packs run. Use for matrix-row
      # parameterisation (e.g. POSTGRES_TEST_URL per row) or secret
      # injection (when paired with explicit secrets).
      extra_env_json:
        description: |
          JSON object of additional env vars to export to GITHUB_ENV.
          Example:
            extra_env_json: |
              {"POSTGRES_TEST_URL": "postgres://u:p@postgres:5432/db",
               "RUSTFLAGS": "-C link-arg=-fuse-ld=lld"}

          Default: empty object (no extras).
        required: false
        type: string
        default: "{}"

      # ─────────────────────────────────────────────────────────────────────────
      # Cache mode override (v5 addition)
      # ─────────────────────────────────────────────────────────────────────────
      # The workflow auto-computes NX_POWERPACK_CACHE_MODE from the trigger
      # (CREEP CVE-2025-36852 mitigation: PR runs are read-only, trusted refs
      # are read-write). Callers with non-standard threat models can override.
      nx_powerpack_cache_mode:
        description: |
          Override the auto-computed @nx/s3-cache mode. Default empty =
          auto: read-only for `pull_request`, read-write for push/schedule/
          workflow_dispatch. Valid explicit values: `read-only`, `read-write`,
          `no-cache`.

          Use to force read-only on workflow_dispatch from feature branches,
          or to disable cache entirely for forensic re-runs.
        required: false
        type: string
        default: ""

    secrets:
      nx_cloud_access_token:
        description: "Nx Cloud access token for remote caching"
        required: false

      codecov_token:
        description: "Codecov token for coverage upload"
        required: false

      github_app_private_key:
        description: "GitHub App private key (optional)"
        required: false

      # Self-hosted Nx cache plumbing (@nx/s3-cache + free `nx register`
      # activation key). Declared explicitly so cross-org `secrets:
      # inherit` callers can still surface them — org-level secrets do
      # NOT cross organization boundaries via inherit, but declared
      # workflow_call.secrets DO propagate when callers pass them.
      nx_key:
        description: "Nx self-hosted cache activation key (free via `nx register`)"
        required: false

      aws_access_key_id:
        description: "AWS_ACCESS_KEY_ID for @nx/s3-cache bucket access"
        required: false

      aws_secret_access_key:
        description: "AWS_SECRET_ACCESS_KEY for @nx/s3-cache bucket access"
        required: false

    outputs:
      lint_result:
        description: "Result of lint task (success/failure/skipped)"
        value: ${{ jobs.ci.outputs.lint_result }}

      test_result:
        description: "Result of test task (success/failure/skipped)"
        value: ${{ jobs.ci.outputs.test_result }}

      build_result:
        description: "Result of build task (success/failure/skipped)"
        value: ${{ jobs.ci.outputs.build_result }}

      affected_projects:
        description: "List of affected projects"
        value: ${{ jobs.ci.outputs.affected_projects }}

env:
  # Opt every JS action onto Node 24 instead of the runner's default
  # Node 20. Once Node 24 becomes GH's default (June 2026), this is a
  # no-op; until then it silences the deprecation warnings + verifies
  # all actions we depend on already work on Node 24.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  # Self-hosted cache plumbing (@nx/s3-cache). As of Nx 21+ the plugin is
  # FREE — no paid Powerpack license required. It needs three env vars:
  #   • NX_KEY: free activation key obtained via `nx register` once per
  #     workspace and stored as an org/repo secret.
  #   • AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: bucket creds the
  #     plugin uses against the S3 endpoint declared in nx.json.
  # Without these, the plugin prints "No self-hosted cache key found.
  # S3 cache will not be used" and silently falls back to local cache.
  NX_KEY: ${{ secrets.nx_key }}
  AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}
  # CVE-2025-36852 (CREEP) — bucket-based remote caches let any writer
  # poison main's task outputs. Mitigate by switching PR runs to
  # read-only; only trusted refs (pushes to default/release branches,
  # scheduled runs, and workflow_dispatch on the default branch) get
  # write access. The @nx/s3-cache plugin honors this env var: any
  # non-empty value other than the literal "read-only" enables
  # read+write; "read-only" disables writes only.
  #
  # Trusted refs use the literal "read-write" rather than empty —
  # the previous `&& '' || 'read-only'` form always resolves to
  # 'read-only' in GH expressions because `'' || x` returns x. We
  # use a non-empty truthy value here so the conditional behaves
  # like an if/else.
  #
  # https://nx.dev/blog/cve-2025-36852-critical-cache-poisoning-vulnerability-creep
  # v5: callers can override via `nx_powerpack_cache_mode` input. Default
  # behavior (empty input) preserves the v4 auto-compute logic.
  NX_POWERPACK_CACHE_MODE: >-
    ${{
      inputs.nx_powerpack_cache_mode != ''
        && inputs.nx_powerpack_cache_mode
        || (
          (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
            && 'read-write'
            || 'read-only'
        )
    }}
  # NX_CLOUD_ACCESS_TOKEN is intentionally NOT declared at workflow
  # level. Declaring it here evaluates `secrets.nx_cloud_access_token`
  # to "" when the secret isn't set, and an empty-but-present env var
  # still satisfies Nx's "is set" check — triggering a SaaS auth probe
  # that fails with "Invalid credentials" even though the caller never
  # asked to use Nx Cloud. Steps that need it surface it conditionally
  # via _NX_CLOUD_TOKEN_RAW (see the run-nx steps below).
  NX_NO_CLOUD: ${{ inputs.nx_cloud_enabled == false && 'true' || '' }}
  # Verbose diagnostic env. IMPORTANT: empty-string values are still "set"
  # from the child-process perspective, and cargo strictly validates these
  # — e.g. CARGO_TERM_VERBOSE="" fails with:
  #   error in environment variable `CARGO_TERM_VERBOSE`: provided string
  #   was not `true` or `false`
  # So in the non-verbose branch of each ternary we emit an explicit
  # valid "default" value rather than ''.
  #
  # We intentionally do NOT set NX_VERBOSE_LOGGING here. That env var
  # causes Nx to print diagnostic lines like "[isolated-plugin] spawned
  # worker ..." to stdout, which corrupts the JSON output of tooling calls
  # like `nx show projects --json` in the "Get affected projects" step.
  # Verbosity for lint/test/build is achieved by the `--verbose` CLI flag
  # appended to those commands (see below).
  RUST_BACKTRACE: ${{ inputs.verbose && '1' || '0' }}
  CARGO_TERM_VERBOSE: ${{ inputs.verbose && 'true' || 'false' }}
  CARGO_TERM_COLOR: ${{ inputs.verbose && 'always' || 'auto' }}
  # false = keep terminal rewriting on (Nx's default behavior, preserves
  # the summary-line UX). true = verbose mode turns it off so per-task
  # output isn't collapsed in CI logs.
  NX_TASKS_RUNNER_DYNAMIC_OUTPUT: ${{ inputs.verbose && 'false' || 'true' }}

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: ${{ inputs.timeout_minutes }}

    # v3: optional container runner. An empty `image` is treated by the
    # GitHub Actions runner as "no container — run on the host", so leaving
    # `container_image` empty preserves the legacy v2 behavior bit-for-bit.
    # When the input is set, every step below executes inside the image.
    container:
      image: ${{ inputs.container_image }}
      options: ${{ inputs.container_options }}
      # github.token is auto-available in every job (including reusables);
      # registry pulls of private GHCR images succeed as long as the caller
      # workflow grants `packages: read`.
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}

    outputs:
      lint_result: ${{ steps.lint.outcome }}
      test_result: ${{ steps.test.outcome }}
      build_result: ${{ steps.build.outcome }}
      affected_projects: ${{ steps.affected.outputs.projects }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
        # v3.0.2: force bash for every step. When `container_image` is set
        # and the image is debian/ubuntu-based, the default `run:` shell
        # is POSIX `sh` (dash on Debian), which chokes on the `[[ ... ]]`
        # and `==` bash idioms used throughout this file (and on inherited
        # /usr/bin/[ behavior). Host-runner jobs default to `bash -e` and
        # were never affected. Pinning bash here makes container-mode and
        # host-mode behave identically. Any image used as container_image
        # must include /usr/bin/bash — true for the standard build-env
        # image and every Debian/Ubuntu/Alpine-with-bash base.
        shell: bash

    steps:
      # ════════════════════════════════════════════════════════════════════════
      # 📥 CHECKOUT
      # ════════════════════════════════════════════════════════════════════════

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      # v3.0.4: pin git safe.directory globally.
      # actions/checkout@v4 only sets safe.directory in a temporary HOME
      # (per its source: `Temporarily overriding HOME=<tmp>`), so the
      # exception evaporates by the next step. In container mode the
      # workspace at /__w/<repo>/<repo> is owned by the host runner's
      # uid but git inside the container runs as root → "dubious
      # ownership" abort. Adding the wildcard exception to the
      # persistent /root/.gitconfig (or wherever HOME resolves) survives
      # across steps. Cheap no-op on host runners where ownership
      # already matches.
      - name: Configure git safe.directory
        shell: bash
        run: git config --global --add safe.directory '*'

      # ════════════════════════════════════════════════════════════════════════
      # 🔄 NX AFFECTED DETECTION
      # ════════════════════════════════════════════════════════════════════════

      # When the caller is running in single-shard mode (i.e. passed
      # `nx_base`/`nx_head`), skip the action and use those values
      # directly via the env. Keeps all shards in agreement on the
      # affected view even if a new successful workflow lands mid-run.
      - name: Set Nx SHAs for affected detection
        if: inputs.nx_base == '' || inputs.nx_head == ''
        uses: nrwl/nx-set-shas@v4

      - name: Use plan-supplied NX_BASE / NX_HEAD (single-shard mode)
        if: inputs.nx_base != '' && inputs.nx_head != ''
        shell: bash
        run: |
          echo "NX_BASE=${{ inputs.nx_base }}" >> "$GITHUB_ENV"
          echo "NX_HEAD=${{ inputs.nx_head }}" >> "$GITHUB_ENV"
          echo "📥 Using plan-supplied NX_BASE=${{ inputs.nx_base }} NX_HEAD=${{ inputs.nx_head }}"

      # v3.0.3: prime git's well-known empty-tree object.
      # nrwl/nx-set-shas falls back to `4b825dc642cb6eb9a060e54bf8d69288fbee4904`
      # (the empty tree) when no last-successful workflow exists on the branch
      # — typical for the very first workflow_dispatch / push CI run. Git knows
      # this SHA only when the object is in the local object DB; otherwise
      # `git diff <empty-tree-sha> HEAD` (which `nx affected` calls) errors
      # with "Could not access". `hash-object -w -t tree` writes the empty
      # tree if not already present, so subsequent diffs succeed.
      # Idempotent: a no-op once primed.
      - name: Prime git empty-tree object
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: |
          git hash-object -w -t tree --stdin < /dev/null > /dev/null
          echo "✅ empty tree primed: $(git rev-parse 4b825dc642cb6eb9a060e54bf8d69288fbee4904^{tree})"

      # ════════════════════════════════════════════════════════════════════════
      # 🛠️ ENVIRONMENT SETUP
      # ════════════════════════════════════════════════════════════════════════

      # ── Host mode: legacy .environment.yml path (DEPRECATED) ─────────────
      # The env-setup composite only fires when the workspace actually
      # ships the config file — the mechanism is deprecated in favor of
      # the explicit `system_packages` input + language packs, and a
      # workspace without the file must not pay (or risk) the legacy
      # step. Detection is a plain file check so removing
      # .environment.yml from a workspace fully retires the path.
      - name: Detect legacy environment config
        id: legacy-envcfg
        if: inputs.container_image == ''
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        env:
          ENV_CONFIG: ${{ inputs.environment_config }}
        run: |
          set -euo pipefail
          if [ -n "$ENV_CONFIG" ] && [ -f "$ENV_CONFIG" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  ${ENV_CONFIG} found — running the DEPRECATED legacy environment-setup. Migrate to system_packages + language packs."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  no ${ENV_CONFIG:-environment config} in the workspace — legacy environment-setup skipped."
          fi

      - name: Setup environment (host mode, legacy)
        if: inputs.container_image == '' && steps.legacy-envcfg.outputs.present == 'true'
        uses: tsok-org/.github/actions/environment-setup@v5
        with:
          config: ${{ inputs.environment_config }}
          working_directory: ${{ inputs.working_directory }}
          github_app_id: ${{ inputs.github_app_id }}
          github_app_private_key: ${{ secrets.github_app_private_key }}
          skip: ${{ inputs.environment_skip }}
          only: ${{ inputs.environment_only }}
          container_image: ${{ inputs.container_image }}

      # ── Host mode: install caller-supplied system packages (v5 addition).
      # Replaces the .environment.yml + environment-setup-driven apt
      # install — system_packages is now an explicit nx-ci.yml input,
      # surfacing the package set in the calling workflow's PR diff.
      # Skipped in container mode (the image is the contract).
      - name: Install system packages (host mode)
        if: inputs.container_image == '' && inputs.system_packages != ''
        shell: bash
        env:
          PACKAGES: ${{ inputs.system_packages }}
        run: |
          set -euo pipefail
          # Normalise whitespace + newlines into space-separated tokens.
          pkgs=$(echo "$PACKAGES" | tr '\n' ' ' | xargs)
          if [ -z "$pkgs" ]; then
            echo "ℹ️  system_packages input is whitespace-only; nothing to install."
            exit 0
          fi
          echo "📦 Installing system packages: $pkgs"
          sudo apt-get update -y
          # shellcheck disable=SC2086 -- intentional word splitting
          sudo apt-get install -y --no-install-recommends $pkgs

      # ── Export caller-provided env vars first so language packs and
      # downstream nx commands see them. Empty `extra_env_json: "{}"` is
      # a no-op. Originally container-only; relaxed to host mode too so
      # host-mode callers can inject e.g. SCCACHE_* / cache endpoints
      # without a reusable-workflow change per variable.
      - name: Apply extra env vars
        if: inputs.extra_env_json != '' && inputs.extra_env_json != '{}'
        shell: bash
        env:
          EXTRA_ENV_JSON: ${{ inputs.extra_env_json }}
        run: |
          set -euo pipefail
          # Validate JSON shape early. jq returns non-zero on invalid input.
          echo "$EXTRA_ENV_JSON" | jq -e 'type == "object"' >/dev/null \
            || { echo "::error::extra_env_json must be a JSON object"; exit 1; }
          # Iterate keys/values via jq, append name=value to $GITHUB_ENV.
          while IFS=$'\t' read -r key value; do
            echo "$key=$value" >> "$GITHUB_ENV"
            echo "🌱 exported $key"
          done < <(echo "$EXTRA_ENV_JSON" | jq -r 'to_entries[] | "\(.key)\t\(.value)"')

      # ── ALWAYS install Nx workspace deps (nx itself is a Node package,
      # regardless of app-code language). Detects the package manager
      # from lockfiles and runs the frozen-lockfile install.
      #
      # Both modes since v5.1: host mode used to get its `pnpm install`
      # from the legacy environment-setup path, which is
      # deprecation-gated on `.environment.yml` existing — once a caller
      # deleted that file, NOTHING installed node_modules in host mode
      # and every `pnpm nx …` died with "Command nx not found". When the
      # legacy step does run (file present), it executes before this one
      # and the second frozen install is a fast no-op.
      - name: Workspace setup
        uses: tsok-org/.github/actions/nx-workspace-setup@v5
        with:
          working_directory: ${{ inputs.working_directory }}
          frozen_lockfile: "true"

      # ── Caller setup commands (v5.3): repo-specific tooling installs
      # that neither apt nor the image covers (see the input's docs).
      # Runs after workspace setup so the commands can use repo scripts
      # AND node_modules tooling; before language packs so installed
      # binaries are on PATH for everything that follows.
      - name: Run caller setup commands
        if: inputs.setup_commands != ''
        shell: bash
        working-directory: ${{ inputs.working_directory }}
        run: ${{ inputs.setup_commands }}

      # ── Language-specific packs. Each pack is a thin composite that does
      # its language's CI-glue extras (env validation, cache scoping, tool
      # installs). NOT language toolchain install — that's the container
      # image's (or host runner image's) responsibility. Runs in BOTH
      # modes since v5.1: host mode used to delegate this to the legacy
      # environment-setup path, which is deprecation-gated now — without
      # the pack, host-mode jobs would get no Rust glue (nextest install,
      # sccache enablement) at all. The composite gates its container-only
      # steps internally on the container_image input it receives.
      - name: Rust language pack
        if: contains(format(',{0},', inputs.language_packs), ',rust,')
        uses: tsok-org/.github/actions/nx-rust-setup@v5
        with:
          target: ${{ inputs.target }}
          shard: ${{ inputs.shard }}
          shards_total: ${{ inputs.shards_total }}
          container_image: ${{ inputs.container_image }}

      # Add future language packs here. Each is a separate `uses:` step
      # gated on `contains(format(',{0},', inputs.language_packs), ',<lang>,')`.
      # Adding a pack does NOT require touching any other part of this
      # workflow — only the composite at actions/nx-<lang>-setup/action.yml
      # plus a step here.

      # NOTE: Rust linker selection is now baked per-repo via
      # `.cargo/config.toml` (callers commit their own per-target
      # `[target.<triple>] rustflags = [...]` blocks). The runtime
      # "Apply Rust linker flag" step that lived here has been removed
      # — it was carrying a single hard-coded `lld` flag for the host
      # triple and didn't survive cross-compile targets (wasm32-wasip2,
      # aarch64-musl) cleanly. Repos that want a non-default linker now
      # commit it explicitly.

      # ════════════════════════════════════════════════════════════════════════
      # ☁️ NX CLOUD DISTRIBUTION (OPTIONAL)
      # ════════════════════════════════════════════════════════════════════════

      - name: Start Nx Cloud CI run
        if: inputs.distribute_on != ''
        run: |
          echo "☁️ Starting distributed CI run..."
          pnpm nx-cloud start-ci-run \
            --distribute-on="${{ inputs.distribute_on }}" \
            --stop-agents-after="${{ inputs.stop_agents_after }}"

      # ════════════════════════════════════════════════════════════════════════
      # 📋 GET AFFECTED PROJECTS
      # ════════════════════════════════════════════════════════════════════════

      # NOTE: Per-shard CARGO_TARGET_DIR scoping moved to the Rust language
      # pack composite (actions/nx-rust-setup). The composite runs in
      # container mode only — host mode doesn't need shard scoping because
      # the env-setup composite handles it via .environment.yml setup-rust
      # block.

      - name: Get affected projects
        id: affected
        run: |
          # Single-shard mode: caller passed an explicit project list
          # (from nx-affected-plan.yml's matrix). Use it directly.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            AFFECTED=$(printf '%s\n' "${{ inputs.projects }}" | jq -Rcr 'split(",")')
            echo "📥 Single-shard mode: projects=${{ inputs.projects }}"
            echo "projects=$AFFECTED" >> "$GITHUB_OUTPUT"
            echo "📋 Affected projects: $AFFECTED"
            exit 0
          fi

          if [ "${{ inputs.affected_only }}" == "true" ]; then
            AFFECTED=$(pnpm nx show projects --affected --json 2>/dev/null || echo "[]")
          else
            AFFECTED=$(pnpm nx show projects --json 2>/dev/null || echo "[]")
          fi
          echo "projects=$AFFECTED" >> "$GITHUB_OUTPUT"
          echo "📋 Affected projects: $AFFECTED"

      # ════════════════════════════════════════════════════════════════════════
      # 🔍 LINT
      # ════════════════════════════════════════════════════════════════════════

      - name: Run lint
        id: lint
        if: |
          (inputs.target == '' && inputs.lint) ||
          inputs.target == 'lint'
        run: |
          echo "🔍 Running lint..."
          CMD="pnpm nx"

          # Single-shard mode (matrix-row caller): use explicit project list.
          # Otherwise honor the legacy affected/all toggle.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            CMD="$CMD run-many -p ${{ inputs.projects }}"
          elif [ "${{ inputs.affected_only }}" == "true" ]; then
            CMD="$CMD affected"
          else
            CMD="$CMD run-many"
          fi

          # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
          TARGET_SUFFIX="${{ inputs.target_configuration }}"
          CMD="$CMD -t lint${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

          if [ -n "${{ inputs.exclude_projects }}" ]; then
            CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
          fi

          if [ "${{ inputs.verbose }}" == "true" ]; then
            CMD="$CMD --verbose"
          fi

          # v3.0.6: when nx_cloud_enabled is false, fully disable any
          # cloud interaction:
          #   - unset NX_CLOUD_ACCESS_TOKEN entirely (an empty env var
          #     still satisfies Nx's `if (env.X !== undefined)` checks
          #     and triggers cloud-auth probes in plugins like
          #     @nx/s3-cache, which fail loudly on empty credentials)
          #   - append `--no-cloud` to the nx invocation so the CLI
          #     also opts out at the command level (belt + suspenders)
          if [ "${{ inputs.nx_cloud_enabled }}" == "false" ]; then
            unset NX_CLOUD_ACCESS_TOKEN
            CMD="$CMD --no-cloud"
          fi

          echo "Running: $CMD"
          $CMD

      # ════════════════════════════════════════════════════════════════════════
      # 🧪 TEST
      # ════════════════════════════════════════════════════════════════════════

      - name: Run tests
        id: test
        if: |
          (inputs.target == '' && inputs.test) ||
          inputs.target == 'test'
        run: |
          echo "🧪 Running tests..."
          CMD="pnpm nx"

          # Single-shard mode (matrix-row caller): use explicit project list.
          # Otherwise honor the legacy affected/all toggle.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            CMD="$CMD run-many -p ${{ inputs.projects }}"
          elif [ "${{ inputs.affected_only }}" == "true" ]; then
            CMD="$CMD affected"
          else
            CMD="$CMD run-many"
          fi

          # One unified `test` target per project. Coverage is a property of
          # the test target itself (e.g. a project whose `test` runs
          # `cargo llvm-cov ...` produces lcov.info as a side effect); the
          # `coverage` input on this workflow only gates whether we *upload*
          # those lcov artifacts downstream, not which target we run.
          # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
          TARGET_SUFFIX="${{ inputs.target_configuration }}"
          CMD="$CMD -t test${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

          if [ -n "${{ inputs.exclude_projects }}" ]; then
            CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
          fi

          if [ "${{ inputs.verbose }}" == "true" ]; then
            CMD="$CMD --verbose"
          fi

          # v3.0.6: when nx_cloud_enabled is false, fully disable any
          # cloud interaction:
          #   - unset NX_CLOUD_ACCESS_TOKEN entirely (an empty env var
          #     still satisfies Nx's `if (env.X !== undefined)` checks
          #     and triggers cloud-auth probes in plugins like
          #     @nx/s3-cache, which fail loudly on empty credentials)
          #   - append `--no-cloud` to the nx invocation so the CLI
          #     also opts out at the command level (belt + suspenders)
          if [ "${{ inputs.nx_cloud_enabled }}" == "false" ]; then
            unset NX_CLOUD_ACCESS_TOKEN
            CMD="$CMD --no-cloud"
          fi

          echo "Running: $CMD"
          $CMD

      # ════════════════════════════════════════════════════════════════════════
      # 🧪 INTEGRATION (OPTIONAL, CD-GATED)
      # ════════════════════════════════════════════════════════════════════════

      - name: Run integration
        id: integration
        if: |
          (inputs.target == '' && inputs.integration) ||
          inputs.target == 'integration'
        run: |
          echo "🧪 Running integration..."
          CMD="pnpm nx"

          # Single-shard mode (matrix-row caller): use explicit project list.
          # Otherwise honor the legacy affected/all toggle.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            CMD="$CMD run-many -p ${{ inputs.projects }}"
          elif [ "${{ inputs.affected_only }}" == "true" ]; then
            CMD="$CMD affected"
          else
            CMD="$CMD run-many"
          fi

          # Projects without an `integration` target are skipped by Nx,
          # so `run-many -t integration` is safe to run across every
          # project even when only a subset declares the target.
          # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
          # This is the common case for per-DB-engine matrices (pg14/pg17 etc).
          TARGET_SUFFIX="${{ inputs.target_configuration }}"
          CMD="$CMD -t integration${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

          if [ -n "${{ inputs.exclude_projects }}" ]; then
            CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
          fi

          if [ "${{ inputs.verbose }}" == "true" ]; then
            CMD="$CMD --verbose"
          fi

          # v3.0.6: when nx_cloud_enabled is false, fully disable any
          # cloud interaction:
          #   - unset NX_CLOUD_ACCESS_TOKEN entirely (an empty env var
          #     still satisfies Nx's `if (env.X !== undefined)` checks
          #     and triggers cloud-auth probes in plugins like
          #     @nx/s3-cache, which fail loudly on empty credentials)
          #   - append `--no-cloud` to the nx invocation so the CLI
          #     also opts out at the command level (belt + suspenders)
          if [ "${{ inputs.nx_cloud_enabled }}" == "false" ]; then
            unset NX_CLOUD_ACCESS_TOKEN
            CMD="$CMD --no-cloud"
          fi

          echo "Running: $CMD"
          $CMD

      # ════════════════════════════════════════════════════════════════════════
      # 📊 COVERAGE UPLOAD (OPTIONAL)
      # ════════════════════════════════════════════════════════════════════════

      - name: Upload coverage artifacts
        if: inputs.coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}-${{ github.run_attempt }}
          # Glob across the workspace for typical coverage outputs.
          # Rust (cargo-llvm-cov): target/lcov.info
          # TS (jest): coverage/lcov.info
          # Generic: coverage/, target/lcov.info
          path: |
            coverage/**
            **/lcov.info
            **/target/llvm-cov/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload coverage to Codecov
        if: inputs.coverage && inputs.coverage_reporter == 'codecov'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.codecov_token }}
          directory: ./coverage
          fail_ci_if_error: false

      - name: Upload coverage to Coveralls
        if: inputs.coverage && inputs.coverage_reporter == 'coveralls'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ github.token }}
          path-to-lcov: ./coverage/lcov.info
        continue-on-error: true

      # ════════════════════════════════════════════════════════════════════════
      # 🏗️ BUILD
      # ════════════════════════════════════════════════════════════════════════

      - name: Run build
        id: build
        if: |
          (inputs.target == '' && inputs.build) ||
          inputs.target == 'build'
        run: |
          echo "🏗️ Running build..."
          CMD="pnpm nx"

          # Single-shard mode (matrix-row caller): use explicit project list.
          # Otherwise honor the legacy affected/all toggle.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            CMD="$CMD run-many -p ${{ inputs.projects }}"
          elif [ "${{ inputs.affected_only }}" == "true" ]; then
            CMD="$CMD affected"
          else
            CMD="$CMD run-many"
          fi

          # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
          TARGET_SUFFIX="${{ inputs.target_configuration }}"
          CMD="$CMD -t build${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

          if [ -n "${{ inputs.exclude_projects }}" ]; then
            CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
          fi

          if [ "${{ inputs.verbose }}" == "true" ]; then
            CMD="$CMD --verbose"
          fi

          # v3.0.6: when nx_cloud_enabled is false, fully disable any
          # cloud interaction:
          #   - unset NX_CLOUD_ACCESS_TOKEN entirely (an empty env var
          #     still satisfies Nx's `if (env.X !== undefined)` checks
          #     and triggers cloud-auth probes in plugins like
          #     @nx/s3-cache, which fail loudly on empty credentials)
          #   - append `--no-cloud` to the nx invocation so the CLI
          #     also opts out at the command level (belt + suspenders)
          if [ "${{ inputs.nx_cloud_enabled }}" == "false" ]; then
            unset NX_CLOUD_ACCESS_TOKEN
            CMD="$CMD --no-cloud"
          fi

          echo "Running: $CMD"
          $CMD

      # ════════════════════════════════════════════════════════════════════════
      # 🌐 E2E (OPTIONAL)
      # ════════════════════════════════════════════════════════════════════════

      - name: Run e2e tests
        id: e2e
        if: |
          (inputs.target == '' && inputs.e2e) ||
          inputs.target == 'e2e'
        run: |
          echo "🌐 Running e2e tests..."
          CMD="pnpm nx"

          # Single-shard mode (matrix-row caller): use explicit project list.
          # Otherwise honor the legacy affected/all toggle.
          if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
            CMD="$CMD run-many -p ${{ inputs.projects }}"
          elif [ "${{ inputs.affected_only }}" == "true" ]; then
            CMD="$CMD affected"
          else
            CMD="$CMD run-many"
          fi

          # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
          TARGET_SUFFIX="${{ inputs.target_configuration }}"
          CMD="$CMD -t e2e${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

          if [ -n "${{ inputs.exclude_projects }}" ]; then
            CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
          fi

          if [ "${{ inputs.verbose }}" == "true" ]; then
            CMD="$CMD --verbose"
          fi

          # v3.0.6: when nx_cloud_enabled is false, fully disable any
          # cloud interaction:
          #   - unset NX_CLOUD_ACCESS_TOKEN entirely (an empty env var
          #     still satisfies Nx's `if (env.X !== undefined)` checks
          #     and triggers cloud-auth probes in plugins like
          #     @nx/s3-cache, which fail loudly on empty credentials)
          #   - append `--no-cloud` to the nx invocation so the CLI
          #     also opts out at the command level (belt + suspenders)
          if [ "${{ inputs.nx_cloud_enabled }}" == "false" ]; then
            unset NX_CLOUD_ACCESS_TOKEN
            CMD="$CMD --no-cloud"
          fi

          echo "Running: $CMD"
          $CMD

      # ════════════════════════════════════════════════════════════════════════
      # 🔧 CUSTOM TASKS (OPTIONAL)
      # ════════════════════════════════════════════════════════════════════════

      - name: Run custom tasks
        # In single-shard mode, the matrix-row caller sets `target` to
        # the specific custom task name (e.g. "build:cdylib"); the
        # `inputs.custom_tasks` legacy CSV is ignored. Multi-target
        # mode keeps the original CSV-driven loop.
        if: |
          (inputs.target == '' && inputs.custom_tasks != '') ||
          (inputs.target != '' &&
           inputs.target != 'lint' &&
           inputs.target != 'test' &&
           inputs.target != 'build' &&
           inputs.target != 'integration' &&
           inputs.target != 'e2e')
        run: |
          # In single-shard mode the caller passes the target name via
          # `target`; iterate over just that one. Otherwise iterate the
          # legacy CSV from `custom_tasks`.
          if [ -n "${{ inputs.target }}" ]; then
            TASKS="${{ inputs.target }}"
            echo "🔧 Running custom task (single-shard): $TASKS"
          else
            TASKS=$(echo "${{ inputs.custom_tasks }}" | tr ',' ' ')
            echo "🔧 Running custom tasks: ${{ inputs.custom_tasks }}"
          fi

          for TASK in $TASKS; do
            echo "Running task: $TASK"
            CMD="pnpm nx"

            # Single-shard mode (matrix-row caller): use explicit project list.
            if [ -n "${{ inputs.target }}" ] && [ -n "${{ inputs.projects }}" ]; then
              CMD="$CMD run-many -p ${{ inputs.projects }}"
            elif [ "${{ inputs.affected_only }}" == "true" ]; then
              CMD="$CMD affected"
            else
              CMD="$CMD run-many"
            fi

            # v5: pass --configuration iff target_configuration is set. (The
          # -t target:configuration colon form looks supported but run-many
          # silently matches NOTHING for inferred-target configurations —
          # nx prints "projects do not have a configuration" and exits 0,
          # a false green. The --configuration flag resolves correctly.)
            TARGET_SUFFIX="${{ inputs.target_configuration }}"
            CMD="$CMD -t ${TASK}${TARGET_SUFFIX:+ --configuration $TARGET_SUFFIX} --parallel=${{ inputs.parallel }}"

            if [ -n "${{ inputs.exclude_projects }}" ]; then
              CMD="$CMD --exclude=${{ inputs.exclude_projects }}"
            fi

            $CMD
          done
      # ════════════════════════════════════════════════════════════════════════
      # 📊 SUMMARY
      # ════════════════════════════════════════════════════════════════════════

      - name: Job Summary
        if: always()
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|:-----|:-------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ inputs.lint }}" == "true" ]; then
            [[ "${{ steps.lint.outcome }}" == "success" ]] && S="✅" || S="❌"
            echo "| Lint | ${S} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.test }}" == "true" ]; then
            [[ "${{ steps.test.outcome }}" == "success" ]] && S="✅" || S="❌"
            echo "| Test | ${S} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.build }}" == "true" ]; then
            [[ "${{ steps.build.outcome }}" == "success" ]] && S="✅" || S="❌"
            echo "| Build | ${S} |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ inputs.e2e }}" == "true" ]; then
            [[ "${{ steps.e2e.outcome }}" == "success" ]] && S="✅" || S="❌"
            echo "| E2E | ${S} |" >> $GITHUB_STEP_SUMMARY
          fi
