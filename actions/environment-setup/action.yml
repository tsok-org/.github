# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                         ENVIRONMENT SETUP ACTION                             ║
# ╠══════════════════════════════════════════════════════════════════════════════╣
# ║  Universal environment setup from .environment.yml                           ║
# ║  Handles runtimes, tools, and services declaratively.                        ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ┌─────────────────────────────────────────────────────────────────────────────┐
# │ FEATURES                                                                    │
# ├─────────────────────────────────────────────────────────────────────────────┤
# │ • Declarative configuration via .environment.yml (validated by schema.json) │
# │ • GitHub App or token authentication                                       │
# │ • Automatic runtime detection (Node.js, Python, Go, Rust, ...)             │
# │ • Infrastructure tools (Terraform, Terragrunt, Docker)                     │
# │ • Service containers (Postgres, Redis, NATS, etc.)                         │
# │ • C/C++ toolchain provisioning (gcc/clang, cmake, pkg-config)              │
# │ • Credentials from environment variables (DOCKER_*, POSTGRES_*, etc.)      │
# └─────────────────────────────────────────────────────────────────────────────┘

name: Environment Setup
description: |
  Universal environment setup from .environment.yml configuration.
  Supports runtimes (Node.js, Python, Go, Rust), tools (Terraform, Docker),
  C toolchains, and service containers. See README.md for usage examples.

inputs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Configuration
  # ─────────────────────────────────────────────────────────────────────────────
  config:
    description: Path to environment configuration file
    default: ".environment.yml"

  working_directory:
    description: Working directory for setup operations
    default: "."

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Authentication
  # ─────────────────────────────────────────────────────────────────────────────
  github_app_id:
    description: |
      GitHub App ID for authentication.
      Preferred over token for branch protection bypass.
    required: false

  github_app_private_key:
    description: GitHub App private key (PEM format)
    required: false

  github_token:
    description: |
      GitHub token (fallback if no App credentials).
      Used for registry auth and API calls.
    default: ${{ github.token }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Component Selection
  # ─────────────────────────────────────────────────────────────────────────────
  skip:
    description: |
      Components to skip (comma-separated).
      Options: node, python, terraform, docker, services, rust, go, c, system_packages
      Example: "services,docker"
    default: ""

  only:
    description: |
      Only setup these components (comma-separated).
      If set, only listed components are configured.
      Example: "node" or "node,terraform"
    default: ""

# Forward the per-component setup flags from the internal "Parse configuration"
# step to consumers of this composite action. Needed so downstream jobs can
# assert on what got set up (self-test workflow, diagnostic summaries, etc.).
# Composite actions only expose step outputs through this top-level block.
outputs:
  setup_node:
    description: "Whether Node.js setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_node }}
  setup_python:
    description: "Whether Python setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_python }}
  setup_rust:
    description: "Whether Rust cache/diagnostics setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_rust }}
  setup_go:
    description: "Whether Go setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_go }}
  setup_c:
    description: "Whether C toolchain setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_c }}
  setup_terraform:
    description: "Whether Terraform setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_terraform }}
  setup_docker:
    description: "Whether Docker setup ran (true/false)"
    value: ${{ steps.config.outputs.setup_docker }}
  service_redis:
    description: "Whether redis-server was installed onto PATH (true/false)"
    value: ${{ steps.config.outputs.service_redis }}
  service_nats:
    description: "Whether nats-server was installed onto PATH (true/false)"
    value: ${{ steps.config.outputs.service_nats }}
  service_postgres:
    description: "Whether PostgreSQL was installed + started (true/false). When true, POSTGRES_TEST_URL is set in the environment."
    value: ${{ steps.config.outputs.service_postgres }}
  service_mysql:
    description: "Whether MySQL was installed + started (true/false). When true, MYSQL_TEST_URL is set in the environment."
    value: ${{ steps.config.outputs.service_mysql }}
  setup_system_packages:
    description: "Whether apt system_packages were installed (true/false)"
    value: ${{ steps.config.outputs.setup_system_packages }}

runs:
  using: composite
  steps:
    # ══════════════════════════════════════════════════════════════════════════
    # 🔐 GITHUB APP TOKEN (if credentials provided)
    # ══════════════════════════════════════════════════════════════════════════

    - name: Generate GitHub App Token
      id: app-token
      if: inputs.github_app_id != '' && inputs.github_app_private_key != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.github_app_id }}
        private-key: ${{ inputs.github_app_private_key }}

    - name: Set effective token
      id: token
      shell: bash
      run: |
        if [[ -n "${{ steps.app-token.outputs.token }}" ]]; then
          echo "token=${{ steps.app-token.outputs.token }}" >> "$GITHUB_OUTPUT"
          echo "🔐 Using GitHub App token"
        else
          echo "token=${{ inputs.github_token }}" >> "$GITHUB_OUTPUT"
          echo "🔑 Using provided GitHub token"
        fi

    # ══════════════════════════════════════════════════════════════════════════
    # ✅ VALIDATE CONFIGURATION (JSON Schema)
    # ══════════════════════════════════════════════════════════════════════════
    # Runs before the parser so misconfigured .environment.yml files fail with a
    # clear schema error instead of mysterious parser output drift. Skipped
    # cleanly when no config file exists (the parser has its own default path).

    - name: Validate environment configuration
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        CONFIG_FILE: ${{ inputs.config }}
        SCHEMA_FILE: ${{ github.action_path }}/schema.json
      run: |
        if [[ ! -f "$CONFIG_FILE" ]]; then
          echo "ℹ️ No $CONFIG_FILE present — skipping schema validation."
          exit 0
        fi
        echo "📐 Validating $CONFIG_FILE against $SCHEMA_FILE"
        if ! command -v check-jsonschema >/dev/null 2>&1; then
          python3 -m pip install --quiet --user pipx >/dev/null 2>&1 || true
          pipx install --quiet check-jsonschema \
            || pip install --quiet --user check-jsonschema \
            || python3 -m pip install --quiet --user --break-system-packages check-jsonschema
          export PATH="$HOME/.local/bin:$PATH"
        fi
        if ! check-jsonschema --schemafile "$SCHEMA_FILE" "$CONFIG_FILE"; then
          echo ""
          echo "::error::.environment.yml failed schema validation."
          echo "─── $CONFIG_FILE ────────────────────────────────────────────"
          sed 's/^/  /' "$CONFIG_FILE"
          echo "─── schema: $SCHEMA_FILE ────────────────────────────────────"
          echo "  (see errors above for the specific field)"
          exit 1
        fi
        echo "✅ Configuration is valid."

    # ══════════════════════════════════════════════════════════════════════════
    # 📖 PARSE CONFIGURATION
    # ══════════════════════════════════════════════════════════════════════════

    - name: Parse environment configuration
      id: config
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        SKIP_COMPONENTS: ${{ inputs.skip }}
        ONLY_COMPONENTS: ${{ inputs.only }}
        CONFIG_FILE: ${{ inputs.config }}
      run: ${{ github.action_path }}/scripts/parse-config.sh "$CONFIG_FILE"

    # ══════════════════════════════════════════════════════════════════════════
    # 🧹 FREE DISK SPACE (optional, Linux only)
    # ══════════════════════════════════════════════════════════════════════════
    # Runs before any heavy install/compile steps so they see a fresh ~10–14 GB.
    # GitHub-hosted ubuntu runners pre-install Android SDK, .NET, Haskell, large
    # Docker images, etc. — none of which we need for a typical Rust/Nx build.
    # Gated on `free_disk_space: true` in .environment.yml so the action remains
    # opt-in (the cleanup takes ~30–60s and isn't needed for small workloads).

    - name: Free disk space
      if: steps.config.outputs.free_disk_space == 'true' && runner.os == 'Linux'
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false       # keep actions/cache, Node, Python, Go pre-installs
        android: true
        dotnet: true
        haskell: true
        large-packages: false   # slow and we don't need most of it gone
        swap-storage: false     # keep swap — Rust linker still benefits
        docker-images: true

    # ══════════════════════════════════════════════════════════════════════════
    # ✅ VALIDATE CI ENV VARS (cargo-critical)
    # ══════════════════════════════════════════════════════════════════════════
    # The nx-ci.yml workflow emits CARGO_TERM_* / RUST_BACKTRACE via ternary
    # expressions. When the ternary is miswired (e.g. `inputs.verbose && 'x' || ''`)
    # cargo hard-errors on empty strings. Catch that here before cargo sees it.
    # Skips quietly when the vars are unset (consumer using this action outside
    # of nx-ci).

    - name: Validate CI env vars
      if: steps.config.outputs.setup_rust == 'true'
      shell: bash
      run: |
        fail=0
        check_enum() {
          local name="$1"; shift
          local value="${!name-__unset__}"
          if [[ "$value" == "__unset__" ]]; then
            return 0
          fi
          for allowed in "$@"; do
            if [[ "$value" == "$allowed" ]]; then
              return 0
            fi
          done
          echo "::error::Invalid $name=\"$value\". Expected one of: $*"
          fail=1
        }
        check_enum CARGO_TERM_VERBOSE "true" "false"
        check_enum CARGO_TERM_COLOR "auto" "always" "never"
        check_enum RUST_BACKTRACE "0" "1" "full"
        if [[ "$fail" -ne 0 ]]; then
          echo "Bad CI env vars will make cargo reject the invocation. Fix the caller."
          exit 1
        fi
        echo "✅ CI env vars valid (or unset — caller is not nx-ci)."

    # ══════════════════════════════════════════════════════════════════════════
    # 🟢 NODE.JS SETUP
    # ══════════════════════════════════════════════════════════════════════════

    - name: Setup Node.js
      if: steps.config.outputs.setup_node == 'true'
      uses: tsok-org/.github/actions/setup-node@main
      with:
        node_version: ${{ steps.config.outputs.node_version_explicit }}
        node_version_file: ${{ steps.config.outputs.node_version_file }}
        install_dependencies: ${{ steps.config.outputs.node_install }}
        frozen_lockfile: ${{ steps.config.outputs.node_frozen_lockfile }}
        working_directory: ${{ inputs.working_directory }}

    # ══════════════════════════════════════════════════════════════════════════
    # 🐍 PYTHON SETUP
    # ══════════════════════════════════════════════════════════════════════════

    - name: Setup Python
      if: steps.config.outputs.setup_python == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: ${{ steps.config.outputs.python_version }}

    - name: Install Poetry
      if: steps.config.outputs.setup_python == 'true' && steps.config.outputs.python_package_manager == 'poetry'
      shell: bash
      run: |
        echo "📦 Installing Poetry..."
        curl -sSL https://install.python-poetry.org | python3 -
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install uv
      if: steps.config.outputs.setup_python == 'true' && steps.config.outputs.python_package_manager == 'uv'
      shell: bash
      run: |
        echo "📦 Installing uv..."
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    # ══════════════════════════════════════════════════════════════════════════
    # 🐹 GO SETUP
    # ══════════════════════════════════════════════════════════════════════════

    - name: Setup Go
      if: steps.config.outputs.setup_go == 'true'
      uses: actions/setup-go@v5
      with:
        go-version: ${{ steps.config.outputs.go_version }}
        go-version-file: ${{ steps.config.outputs.go_version_file }}
        cache: ${{ steps.config.outputs.go_cache }}

    # ══════════════════════════════════════════════════════════════════════════
    # 🏗️ TERRAFORM SETUP
    # ══════════════════════════════════════════════════════════════════════════

    - name: Setup Terraform
      if: steps.config.outputs.setup_terraform == 'true'
      uses: tsok-org/.github/actions/setup-terraform@main
      with:
        terraform_version: ${{ steps.config.outputs.terraform_version }}
        terragrunt_version: ${{ steps.config.outputs.terragrunt_version }}
        tflint: ${{ steps.config.outputs.tflint_enabled }}

    # ══════════════════════════════════════════════════════════════════════════
    # 📦 SYSTEM PACKAGES (apt on Linux)
    # ══════════════════════════════════════════════════════════════════════════
    # Installs OS-level packages listed in .environment.yml's `system_packages`.
    # Typical use: C/C++ build-time deps needed by Rust `*-sys` crates (e.g.
    # `libcurl4-openssl-dev` for `rdkafka-sys`, `libssl-dev` for `openssl-sys`).
    # Runs before Docker setup so downstream build steps see the headers.

    - name: Install system packages (apt)
      if: steps.config.outputs.setup_system_packages == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        echo "📦 Installing apt packages: ${{ steps.config.outputs.system_packages }}"
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends ${{ steps.config.outputs.system_packages }}

    - name: Warn on non-Linux system_packages request
      if: steps.config.outputs.setup_system_packages == 'true' && runner.os != 'Linux'
      shell: bash
      run: |
        echo "::warning::system_packages is only supported on Linux runners; ignoring on ${{ runner.os }}."

    # ══════════════════════════════════════════════════════════════════════════
    # 🔧 C TOOLCHAIN (structured build-deps intent)
    # ══════════════════════════════════════════════════════════════════════════
    # Expresses a toolchain (gcc / clang) + optional cmake, pkg-config, and
    # extra packages. Additive to `system_packages`. Linux-only.

    - name: Setup C toolchain
      if: steps.config.outputs.setup_c == 'true' && runner.os == 'Linux'
      shell: bash
      env:
        TOOLCHAIN_PACKAGES: ${{ steps.config.outputs.c_packages }}
      run: |
        echo "🔧 Installing C toolchain: ${{ steps.config.outputs.c_toolchain }}"
        echo "   packages: $TOOLCHAIN_PACKAGES"
        sudo apt-get update -y
        # shellcheck disable=SC2086
        sudo apt-get install -y --no-install-recommends $TOOLCHAIN_PACKAGES

    - name: Warn on non-Linux C toolchain request
      if: steps.config.outputs.setup_c == 'true' && runner.os != 'Linux'
      shell: bash
      run: |
        echo "::warning::C toolchain provisioning is Linux-only; ignoring on ${{ runner.os }}."

    # ══════════════════════════════════════════════════════════════════════════
    # 🦀 RUST — cache and diagnostics
    # ══════════════════════════════════════════════════════════════════════════
    # Toolchain comes from the repo's rust-toolchain.toml (rustup auto-installs
    # on first cargo invocation). This section provides caching and optional
    # diagnostic prints.

    - name: Rust diagnostics
      if: steps.config.outputs.setup_rust == 'true' && steps.config.outputs.rust_diagnostics == 'true'
      # Diagnostics are informational — continue-on-error keeps failures from
      # blocking CI, but individual commands are NOT silenced so a real problem
      # (curl 403, rustup missing) surfaces as a visible yellow X in the UI.
      continue-on-error: true
      shell: bash
      run: |
        set -e
        echo "🦀 Rust environment diagnostics"
        echo "─────────────────────────────────"
        echo "Runner: ${{ runner.os }} / ${{ runner.arch }}"
        echo "CPU: $(nproc) cores"
        echo "Memory:"
        free -h | sed 's/^/  /'
        echo "Disk (root):"
        df -h / | sed 's/^/  /'
        echo "Cargo: $(cargo --version)"
        echo "Rustup:"
        rustup show | sed 's/^/  /'
        echo "Network (connectivity smoke test):"
        # -o /dev/null: throw away body, only report status
        # --write-out: print status code
        # --max-time: hard 5s cap
        # -f (fail on non-2xx) so a 403 surfaces as a real error at step level.
        for host in https://crates.io/ https://static.rust-lang.org/ https://github.com/; do
          CODE=$(curl -fsS -o /dev/null --max-time 5 -w "%{http_code}" "$host")
          echo "  $host → HTTP $CODE"
        done
        if [[ -f Cargo.toml ]]; then
          echo "Cargo workspace members:"
          cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys, json; d = json.load(sys.stdin); print(*(f'  - {p[\"name\"]}' for p in d['packages']), sep='\n')" \
            | head -40
        fi
        echo "─────────────────────────────────"

    - name: Cache cargo registry + target
      if: steps.config.outputs.setup_rust == 'true' && steps.config.outputs.rust_cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        # Save cache even if the job fails — a partial cache is still faster
        # than no cache for the next run.
        save-if: true
        # Share cache across all jobs in the same workflow, not just the
        # branch. This lets parallel workflows re-use each other's caches.
        shared-key: "rust-workspace"

    - name: Install cargo-llvm-cov (for Rust coverage)
      if: steps.config.outputs.setup_rust == 'true' && steps.config.outputs.rust_coverage == 'true' && runner.os == 'Linux'
      # taiki-e/install-action downloads pre-built binaries — no compile cost.
      # cargo-llvm-cov generates lcov.info via LLVM profiling instrumentation;
      # requires the `llvm-tools-preview` rustup component (callers should
      # add it to rust-toolchain.toml).
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov

    - name: Setup sccache (compiler cache, GitHub Actions backend)
      if: steps.config.outputs.setup_rust == 'true' && steps.config.outputs.rust_sccache == 'true'
      # mozilla-actions/sccache-action installs the sccache binary and sets
      # the env vars cargo needs: RUSTC_WRAPPER=sccache + SCCACHE_GHA_ENABLED=true.
      # The GitHub Actions cache is used as the backend — no external storage
      # required, scoped per-repo. Complements Swatinem/rust-cache: rust-cache
      # restores target/ wholesale, sccache fills in per-object gaps when a
      # partial rebuild is triggered (dep bump, profile change, etc.).
      #
      # Requires CARGO_INCREMENTAL=0 in the environment (sccache warns and
      # silently bypasses when incremental is on). nx-ci.yml sets this by
      # default; standalone consumers should ensure it's set in their env.
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Apply Rust build knobs (CARGO_BUILD_JOBS, linker)
      if: steps.config.outputs.setup_rust == 'true'
      shell: bash
      run: |
        JOBS="${{ steps.config.outputs.rust_build_jobs }}"
        LINKER="${{ steps.config.outputs.rust_linker }}"
        if [[ -n "$JOBS" ]]; then
          echo "🦀 Pinning CARGO_BUILD_JOBS=$JOBS (serial link avoids OOM on small runners)"
          echo "CARGO_BUILD_JOBS=$JOBS" >> "$GITHUB_ENV"
        fi
        if [[ -n "$LINKER" ]]; then
          # Linker flags must be scoped to the HOST target only — setting
          # the global RUSTFLAGS propagates to cross-compile targets
          # (wasm32-wasip2, aarch64-*, etc.) whose linkers (e.g. wasm-
          # component-ld) reject `-fuse-ld=...` with "unexpected argument
          # '-f'". Use CARGO_TARGET_<TRIPLE>_RUSTFLAGS instead, which cargo
          # applies only when building for that specific target.
          case "${{ runner.arch }}" in
            X64)   HOST_TRIPLE="x86_64-unknown-linux-gnu" ;;
            ARM64) HOST_TRIPLE="aarch64-unknown-linux-gnu" ;;
            *)
              echo "::warning::Unknown runner.arch='${{ runner.arch }}'; rust.linker ignored."
              HOST_TRIPLE=""
              ;;
          esac
          if [[ -n "$HOST_TRIPLE" ]]; then
            # CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS, etc.
            HOST_ENV_KEY="CARGO_TARGET_$(echo "$HOST_TRIPLE" | tr '[:lower:]-' '[:upper:]_')_RUSTFLAGS"
            case "$LINKER" in
              lld)
                echo "🦀 Using lld linker (memory-lighter than GNU ld) for $HOST_TRIPLE"
                # Ensure lld is installed; ships with llvm-tools-preview in rustup
                if ! command -v ld.lld >/dev/null 2>&1; then
                  sudo apt-get install -y --no-install-recommends lld
                fi
                echo "${HOST_ENV_KEY}=-C link-arg=-fuse-ld=lld" >> "$GITHUB_ENV"
                ;;
              mold)
                echo "🦀 Using mold linker (fastest + smallest memory) for $HOST_TRIPLE"
                if ! command -v mold >/dev/null 2>&1; then
                  sudo apt-get install -y --no-install-recommends mold
                fi
                echo "${HOST_ENV_KEY}=-C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
                ;;
              *)
                echo "::warning::Unknown rust.linker '$LINKER'; ignoring. Supported: lld, mold."
                ;;
            esac
          fi
        fi

    # ══════════════════════════════════════════════════════════════════════════
    # 🐳 DOCKER SETUP
    # ══════════════════════════════════════════════════════════════════════════
    # Expects DOCKER_REGISTRY (optional, overrides docker.registry from config),
    # DOCKER_USERNAME, DOCKER_PASSWORD in the calling workflow's env.

    - name: Setup Docker
      if: steps.config.outputs.setup_docker == 'true'
      uses: tsok-org/.github/actions/setup-docker@main
      with:
        registry: ${{ steps.config.outputs.docker_registry || env.DOCKER_REGISTRY }}
        username: ${{ env.DOCKER_USERNAME }}
        password: ${{ env.DOCKER_PASSWORD }}
        platforms: ${{ steps.config.outputs.docker_platforms }}
        setup_buildx: ${{ steps.config.outputs.docker_buildx }}

    # ══════════════════════════════════════════════════════════════════════════
    # 📦 SERVICES SETUP
    # ══════════════════════════════════════════════════════════════════════════
    # 🧰 SERVICES (external daemon binaries installed on PATH)
    # ══════════════════════════════════════════════════════════════════════════
    # Daemons (redis-server, nats-server, …) placed directly on the runner's
    # PATH so tests can spawn them themselves via `Command::new("<binary>")`.
    # Tests own server lifecycle — we don't auto-start anything here.

    - name: Install redis-server
      if: steps.config.outputs.service_redis == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        echo "🧰 Installing redis-server via apt"
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends redis-server
        # Don't auto-start — tests spawn it themselves. Just confirm it's on PATH.
        sudo systemctl stop redis-server 2>/dev/null || true
        sudo systemctl disable redis-server 2>/dev/null || true
        redis-server --version

    - name: Install nats-server
      if: steps.config.outputs.service_nats == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        # nats-server isn't in apt; fetch the latest stable release binary.
        # The /releases/latest URL redirects to the most recent tag.
        set -euo pipefail
        case "${{ runner.arch }}" in
          X64)   ASSET_ARCH="linux-amd64" ;;
          ARM64) ASSET_ARCH="linux-arm64" ;;
          *)
            echo "::error::nats-server install not supported on arch=${{ runner.arch }}"
            exit 1
            ;;
        esac
        echo "🧰 Installing nats-server ($ASSET_ARCH)"
        VERSION=$(curl -fsSL -o /dev/null -w '%{url_effective}' \
          https://github.com/nats-io/nats-server/releases/latest \
          | sed 's|.*/tag/||')
        URL="https://github.com/nats-io/nats-server/releases/download/${VERSION}/nats-server-${VERSION}-${ASSET_ARCH}.tar.gz"
        TMP=$(mktemp -d)
        curl -fsSL "$URL" -o "$TMP/nats.tar.gz"
        tar -xzf "$TMP/nats.tar.gz" -C "$TMP"
        sudo install -m 0755 "$TMP"/nats-server-*-${ASSET_ARCH}/nats-server /usr/local/bin/nats-server
        rm -rf "$TMP"
        nats-server --version

    - name: Install + start PostgreSQL
      if: steps.config.outputs.service_postgres == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        echo "🧰 Installing PostgreSQL via apt"
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends postgresql postgresql-contrib
        sudo service postgresql start
        # Wait up to 20s for postgres to accept connections.
        for i in {1..20}; do
          if sudo -u postgres psql -c 'SELECT 1' >/dev/null 2>&1; then break; fi
          sleep 1
        done
        sudo -u postgres psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE USER mcpg WITH PASSWORD 'mcpg' CREATEDB;
          CREATE DATABASE mcpg_test OWNER mcpg;
        SQL
        echo "POSTGRES_TEST_URL=postgres://mcpg:mcpg@localhost/mcpg_test" >> "$GITHUB_ENV"
        psql --version

    - name: Install + start MySQL
      if: steps.config.outputs.service_mysql == 'true' && runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        echo "🧰 Installing/starting MySQL"
        # GitHub's ubuntu-latest ships with mysql-server pre-installed; a
        # fresh apt install covers clean images.
        if ! command -v mysqld >/dev/null 2>&1; then
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends mysql-server
        fi
        sudo service mysql start
        # Wait up to 30s for MySQL to accept connections. We probe with
        # several auth modes because GitHub's pre-installed MySQL uses
        # root/root while a fresh apt install on ubuntu:24.04 uses
        # auth_socket (sudo-only) — and we have to tolerate both.
        MYSQL_ROOT=""
        for _ in {1..30}; do
          if mysql -uroot -proot -e 'SELECT 1' >/dev/null 2>&1; then
            MYSQL_ROOT="mysql -uroot -proot"
            break
          fi
          if sudo mysql -e 'SELECT 1' >/dev/null 2>&1; then
            MYSQL_ROOT="sudo mysql"
            break
          fi
          sleep 1
        done
        if [[ -z "$MYSQL_ROOT" ]]; then
          echo "::error::cannot authenticate to local MySQL as root (tried root/root and auth_socket)"
          exit 1
        fi
        $MYSQL_ROOT -v <<'SQL'
          CREATE USER IF NOT EXISTS 'mcpg'@'127.0.0.1' IDENTIFIED BY 'mcpg';
          CREATE USER IF NOT EXISTS 'mcpg'@'localhost' IDENTIFIED BY 'mcpg';
          CREATE DATABASE IF NOT EXISTS mcpg_test;
          GRANT ALL PRIVILEGES ON mcpg_test.* TO 'mcpg'@'127.0.0.1';
          GRANT ALL PRIVILEGES ON mcpg_test.* TO 'mcpg'@'localhost';
          FLUSH PRIVILEGES;
        SQL
        echo "MYSQL_TEST_URL=mysql://mcpg:mcpg@127.0.0.1/mcpg_test" >> "$GITHUB_ENV"
        mysql --version

    - name: Warn on non-Linux services request
      if: (steps.config.outputs.service_redis == 'true' || steps.config.outputs.service_nats == 'true' || steps.config.outputs.service_postgres == 'true' || steps.config.outputs.service_mysql == 'true') && runner.os != 'Linux'
      shell: bash
      run: |
        echo "::warning::services (redis/nats/postgres/mysql) currently install on Linux only; ignored on ${{ runner.os }}."


    # ══════════════════════════════════════════════════════════════════════════
    # 📊 SUMMARY
    # ══════════════════════════════════════════════════════════════════════════

    - name: Environment Summary
      shell: bash
      run: |
        echo "## 🛠️ Environment Setup Complete" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

        if [[ "${{ steps.config.outputs.setup_node }}" == "true" ]]; then
          echo "| Node.js | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_python }}" == "true" ]]; then
          echo "| Python | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_go }}" == "true" ]]; then
          echo "| Go | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_terraform }}" == "true" ]]; then
          echo "| Terraform | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_docker }}" == "true" ]]; then
          echo "| Docker | ✅ Configured |" >> $GITHUB_STEP_SUMMARY
        fi

        SERVICES=""
        [[ "${{ steps.config.outputs.service_redis }}"    == "true" ]] && SERVICES="${SERVICES}redis "
        [[ "${{ steps.config.outputs.service_nats }}"     == "true" ]] && SERVICES="${SERVICES}nats "
        [[ "${{ steps.config.outputs.service_postgres }}" == "true" ]] && SERVICES="${SERVICES}postgres "
        [[ "${{ steps.config.outputs.service_mysql }}"    == "true" ]] && SERVICES="${SERVICES}mysql "
        if [[ -n "$SERVICES" ]]; then
          echo "| Services | ✅ ${SERVICES% } |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_system_packages }}" == "true" ]]; then
          echo "| System packages (apt) | ✅ ${{ steps.config.outputs.system_packages }} |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_c }}" == "true" ]]; then
          echo "| C toolchain | ✅ ${{ steps.config.outputs.c_toolchain }} |" >> $GITHUB_STEP_SUMMARY
        fi

        if [[ "${{ steps.config.outputs.setup_rust }}" == "true" ]]; then
          echo "| Rust | ✅ cache=${{ steps.config.outputs.rust_cache }}, diagnostics=${{ steps.config.outputs.rust_diagnostics }}, coverage=${{ steps.config.outputs.rust_coverage }} |" >> $GITHUB_STEP_SUMMARY
        fi
